<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Сайт отдела сбыта пищевых концентратов</title>
</head>
<body>
    <section class="auth">
        <div class="container">
            <div class="form_auth">
                <form action="GET">
                    <h1 class="head_form">Форма авторизации</h1>
                    <div class="login">
                        <label class="login_label" for="name">Логин</label>
                        <input type="text">
                    </div>
                    <div class="password">
                        <label class="password_label" for="text">Пароль</label>
                        <input type="password">
                    </div>                    
                    
                    <input type="checkbox"><span class="check"> Запомнить меня</span> 
                    
                    <div class="button_enter">
                        <button class="btn_ent">
                            ВОЙТИ
                        </button>
                    </div>
                
                </form>
            </div>
        </div>
    </section>
</body>
</html>
