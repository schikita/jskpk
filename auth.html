<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Молунов Кирилл</title>
  </head>
  <body>
    <section class="auth">
      <div class="container">
        <div class="form_auth">
          <a class="auth-back" href="./index.html">← На главную</a>

          <h1 class="head_form">Вход в систему</h1>
          <p class="form_subtitle">Выберите роль для входа</p>

          <div class="auth-roles">
            <button type="button" class="auth-role-btn" data-role="user">
              Пользователь
            </button>
            <button type="button" class="auth-role-btn" data-role="manager">
              Менеджер
            </button>
            <button type="button" class="auth-role-btn" data-role="cladman">
              Кладовщик
            </button>
            <button type="button" class="auth-role-btn" data-role="driver">
              Водитель
            </button>
          </div>

          <p id="authError" class="auth-error" hidden></p>
        </div>
      </div>
    </section>

    <aside
      class="cookie-banner cookie-banner--hidden"
      id="cookieBanner"
      role="dialog"
      aria-label="Уведомление о cookie"
      aria-hidden="true"
    >
      <div class="cookie-banner__inner">
        <span class="cookie-banner__icon" aria-hidden="true">🍪</span>
        <p class="cookie-banner__text">
          Мы используем cookie для работы сайта и авторизации.
          Вы можете принять их использование или отклонить необязательные cookie.
        </p>
        <div class="cookie-banner__actions">
          <button
            type="button"
            class="cookie-banner__btn cookie-banner__btn--secondary"
            id="cookieReject"
          >
            Отклонить
          </button>
          <button type="button" class="cookie-banner__btn" id="cookieAccept">
            Принять
          </button>
        </div>
      </div>
    </aside>

    <script src="./cookie-consent.js"></script>
    <script>
      const authError = document.getElementById('authError');

      const rolePages = {
        manager: '/manager-page.html',
        cladman: '/cladman-page.html',
        driver: '/driver-page.html',
        user: '/user-page.html'
      };

      async function loginAs(role) {
        authError.hidden = true;
        authError.textContent = '';

        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ role })
        });

        const data = await response.json();

        if (!data.ok) {
          authError.textContent = data.message;
          authError.hidden = false;
          return;
        }

        window.location.href = rolePages[data.account.role] || '/user-page.html';
      }

      document.querySelectorAll('.auth-role-btn').forEach(function (button) {
        button.addEventListener('click', function () {
          loginAs(button.dataset.role);
        });
      });
    </script>
  </body>
</html>
